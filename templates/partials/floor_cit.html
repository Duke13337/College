<div class="floor-plan-layer floor-plan-layer--cit" aria-hidden="true">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet" class="floor-plan-svg">
        <defs>
            <linearGradient id="fp_ci_bg" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0" stop-color="#e6f4f1"/>
                <stop offset="1" stop-color="#d8ebe7"/>
            </linearGradient>
            <linearGradient id="fp_ci_accent" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0" stop-color="#0d9488"/>
                <stop offset="1" stop-color="#115e59"/>
            </linearGradient>
            <filter id="fp_ci_sh" x="-15%" y="-15%" width="130%" height="140%">
                <feDropShadow dx="0" dy="1" stdDeviation="1.2" flood-color="#134e4a" flood-opacity="0.2"/>
            </filter>
        </defs>
        <rect width="100" height="100" fill="url(#fp_ci_bg)"/>
        <path d="M8 8 L92 8 L92 92 L8 92 Z" fill="#f8fdfc" stroke="url(#fp_ci_accent)" stroke-width="1.3" filter="url(#fp_ci_sh)" stroke-linejoin="round"/>
        <!-- Вертикальный хаб-коридор -->
        <path d="M10 10 L24 10 L24 90 L10 90 Z" fill="#c7eae4" stroke="#0f766e" stroke-width="0.55"/>
        <text x="17" y="52" text-anchor="middle" font-size="3" fill="#115e59" font-family="system-ui,sans-serif" transform="rotate(-90 17 52)" font-weight="600">хаб-коридор</text>
        <!-- Зоны вне бронирования -->
        <rect x="27" y="10" width="63" height="14" rx="1" fill="#dff5f0" stroke="#0f766e" stroke-width="0.45"/>
        <text x="58.5" y="19.5" text-anchor="middle" font-size="2.8" fill="#3f6f68" font-family="system-ui,sans-serif">IT-лаборатории · администрация</text>
        <rect x="27" y="76" width="63" height="14" rx="1" fill="#dff5f0" stroke="#0f766e" stroke-width="0.45"/>
        <text x="58.5" y="85.5" text-anchor="middle" font-size="2.8" fill="#3f6f68" font-family="system-ui,sans-serif">столовая · общая зона</text>
        <!-- Блок аудиторий: чёткая сетка — верх 2 ячейки, низ лекционный зал на всю ширину -->
        <rect x="30" y="28" width="56" height="44" rx="1.2" fill="#eaf8f5" stroke="#14b8a6" stroke-width="0.45" stroke-dasharray="2.5 2" opacity="0.92"/>
        <text x="58" y="31.8" text-anchor="middle" font-size="2.35" fill="#4f7a72" font-family="system-ui,sans-serif" font-weight="600">блок аудиторий</text>
        <!-- Деления: слева переговорная, справа сверху мультимедиа, снизу лекционный -->
        <line x1="46" y1="33" x2="46" y2="47" stroke="#2dd4bf" stroke-width="0.45" opacity="0.55"/>
        <line x1="30.5" y1="47" x2="85.5" y2="47" stroke="#2dd4bf" stroke-width="0.45" opacity="0.55"/>
        <!-- Лёгкая подсказка ячеек (контур без текста, только UX) -->
        <rect x="31.2" y="34.2" width="13.8" height="11.8" rx="0.8" fill="none" stroke="#94d6cf" stroke-width="0.22" opacity="0.85"/>
        <rect x="47.2" y="34.2" width="37.6" height="11.8" rx="0.8" fill="none" stroke="#94d6cf" stroke-width="0.22" opacity="0.85"/>
        <rect x="31.2" y="48.2" width="53.6" height="22.8" rx="1" fill="none" stroke="#94d6cf" stroke-width="0.22" opacity="0.85"/>
        <!-- Лестничный узел -->
        <ellipse cx="88" cy="18" rx="6" ry="7" fill="#e0f2f1" stroke="#0f766e" stroke-width="0.5"/>
        <text x="88" y="19.5" text-anchor="middle" font-size="2.4" fill="#45756f" font-family="system-ui,sans-serif">Л</text>
        <text x="50" y="96.5" text-anchor="middle" font-size="2.6" fill="#6b807c" font-family="system-ui,sans-serif">КИТ · корпус А · схема этажа</text>
    </svg>
</div>
